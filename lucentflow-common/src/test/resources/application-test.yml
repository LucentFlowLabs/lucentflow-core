spring:
  main:
    allow-bean-definition-overriding: true
    keep-alive: false
  lifecycle:
    timeout-per-shutdown-phase: 100ms
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  flyway:
    enabled: false  # Disable Flyway for tests to avoid checksum hell
