server:
  shutdown: graceful
  port: 8080
spring:
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${POSTGRES_DB:lucentflow}
    username: ${POSTGRES_USER:admin}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 600000
      keepalive-time: 30000
      connection-timeout: 60000
      initialization-fail-timeout: 60000
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 50
          order_inserts: true
          order_updates: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    baseline-version: 1
    fail-on-missing-locations: true
  lifecycle:
    timeout:
      startup: 60s
      shutdown: 30s
    timeout-per-shutdown-phase: 30s

lucentflow:
  chain:
    # Default Base public RPC; set LUCENTFLOW_CHAIN_RPC_URL for Alchemy / QuickNode / Infura / BlastAPI (professional tier)
    rpc-url: ${LUCENTFLOW_CHAIN_RPC_URL:https://mainnet.base.org}
  basescan:
    api-key: ${BASESCAN_API_KEY:}
    base-url: ${BASESCAN_BASE_URL:https://api-v2.basescan.org/api}
  indexer:
    start-block: ${LUCENTFLOW_INDEXER_START_BLOCK:}
  telegram:
    bot-token: ${TELEGRAM_BOT_TOKEN:}
    chat-id: ${TELEGRAM_CHAT_ID:}

logging:
  file:
    name: logs/lucentflow.log
  logback:
    rollingpolicy:
      max-history: 7
  level:
    com.lucentflow: INFO
    okhttp3: INFO
    org.web3j: INFO
    org.hibernate.SQL: INFO
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.flywaydb: INFO

---
spring:
  config:
    activate:
      on-profile: local
  flyway:
    enabled: true
    repair-on-migrate: true
    baseline-on-migrate: true
    validate-on-migrate: false # Temporarily bypass validation to allow the repair to trigger
