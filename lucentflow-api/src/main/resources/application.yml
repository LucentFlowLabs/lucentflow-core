server:
  shutdown: graceful
  port: 8080
spring:
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${POSTGRES_DB:lucentflow}
    username: ${POSTGRES_USER:admin}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 600000
      keepalive-time: 30000
      connection-timeout: 60000
      initialization-fail-timeout: 60000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 50
          order_inserts: true
          order_updates: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    baseline-version: 1
    fail-on-missing-locations: true
  lifecycle:
    timeout:
      startup: 60s
      shutdown: 30s
    timeout-per-shutdown-phase: 30s

lucentflow:
  chain:
    # Default Base public RPC; set LUCENTFLOW_CHAIN_RPC_URL for Alchemy / QuickNode / Infura / BlastAPI (professional tier)
    rpc-url: ${LUCENTFLOW_CHAIN_RPC_URL:https://mainnet.base.org}
    # Failover JSON-RPC when primary returns 4xx/5xx (except 429) or I/O errors (5-minute backup window via OkHttp interceptor)
    rpc-backup-url: ${LUCENTFLOW_CHAIN_RPC_BACKUP_URL:https://mainnet.base.org}
    # PROFESSIONAL tier only: sleep between 100-block checkpoint chunks (orchestrator uses max(this, 500ms)). Lower = faster, more 429 risk.
    professional-inter-batch-sleep-ms: ${LUCENTFLOW_CHAIN_PROFESSIONAL_INTER_BATCH_SLEEP_MS:2000}
  basescan:
    api-key: ${BASESCAN_API_KEY:}
    base-url: ${BASESCAN_BASE_URL:https://api-v2.basescan.org/api}
  indexer:
    start-block: ${LUCENTFLOW_INDEXER_START_BLOCK:}
  telegram:
    bot-token: ${TELEGRAM_BOT_TOKEN:}
    chat-id: ${TELEGRAM_CHAT_ID:}

logging:
  file:
    name: logs/lucentflow.log
  logback:
    rollingpolicy:
      max-history: 7
  level:
    # Per-block [PERF] is DEBUG; set LUCENTFLOW_LOGGING_LEVEL_COM_LUCENTFLOW=DEBUG in .env for deep tracing.
    com.lucentflow: ${LUCENTFLOW_LOGGING_LEVEL_COM_LUCENTFLOW:INFO}
    okhttp3: INFO
    org.web3j: INFO
    org.hibernate.SQL: INFO
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.flywaydb: INFO

# Actuator: keep HTTP 200 on /actuator/health even when a component is DOWN so upstream probes
# (e.g. synthetic monitors, legacy load balancers) still receive a JSON body and can parse details.
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
      status:
        http-mapping:
          DOWN: 200
          OUT_OF_SERVICE: 200

---
spring:
  config:
    activate:
      on-profile: local
  flyway:
    enabled: true
    repair-on-migrate: true
    baseline-on-migrate: true
    validate-on-migrate: false # Temporarily bypass validation to allow the repair to trigger
