spring:
  main:
    allow-bean-definition-overriding: true
    keep-alive: false
  lifecycle:
    timeout-per-shutdown-phase: 100ms
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false

lucentflow:
  blockchain:
    # Force a tiny range in tests to prevent runaway polling
    batch-size: 1
    max-blocks-per-sync: 1
