# Test configuration for indexer module
spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  flyway:
    enabled: false
  h2:
    console:
      enabled: true

# Disable web server for tests
server:
  port: 0

# Logging
logging:
  level:
    com.lucentflow: INFO
    org.springframework.boot.test: INFO
    org.hibernate.SQL: WARN
