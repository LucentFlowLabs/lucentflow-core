spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/lucentflow?reWriteBatchedInserts=true&prepareThreshold=0
    username: ${DB_USERNAME:lucentflow}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      # Monday-morning resilience: recycle connections before PG/firewall idle kills; keep TCP alive over long idle (e.g. weekends).
      connection-timeout: 60000
      idle-timeout: 300000
      max-lifetime: 600000
      keepalive-time: 30000
      leak-detection-threshold: 2000
      
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
      show-sql: false
      properties:
        hibernate:
          format_sql: true
          jdbc:
            batch_size: 50
          order_inserts: true
          order_updates: true
          batch_versioned_data: true
          generate_statistics: true
          
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    
  task:
    execution:
      pool:
        core-size: 8
        max-size: 16
        queue-capacity: 100
        thread-name-prefix: lucent-task-

logging:
  level:
    com.lucentflow: INFO
    org.springframework.jdbc: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.stat: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# Performance monitoring endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

# Basescan API Configuration
lucentflow:
  indexer:
    # Scheduler: fixed delay between scan cycles (ms)
    polling-interval-ms: ${LUCENTFLOW_INDEXER_POLLING_INTERVAL_MS:2000}
    # Max block span returned per scan cycle (catch-up pressure valve)
    max-batch-size: ${LUCENTFLOW_INDEXER_MAX_BATCH_SIZE:200}
    # Baseline RPC concurrency for free-tier endpoints (governor may adapt on lag/429)
    max-concurrency: ${LUCENTFLOW_INDEXER_MAX_CONCURRENCY:2}
    # Catch-up boost (lag>1000) increases concurrency by releasing bonus permits.
    # For strict providers (e.g. QuickNode 15 req/s), keep this disabled.
    catchup-boost-enabled: ${LUCENTFLOW_INDEXER_CATCHUP_BOOST_ENABLED:false}
    cooldown:
      # Cooling-down window when HTTP 429 / rate limit is detected.
      window-ms: ${LUCENTFLOW_INDEXER_COOLDOWN_WINDOW_MS:30000}
      # During cooldown, orchestrator pacing is slowed to this scan interval (ms).
      polling-interval-ms: ${LUCENTFLOW_INDEXER_COOLDOWN_POLLING_INTERVAL_MS:10000}
      # During cooldown, block span is reduced to this max batch size.
      max-batch-size: ${LUCENTFLOW_INDEXER_COOLDOWN_MAX_BATCH_SIZE:20}
  chain:
    # Zero-config default: Base mainnet public RPC; override with LUCENTFLOW_CHAIN_RPC_URL for professional endpoints
    rpc-url: ${LUCENTFLOW_CHAIN_RPC_URL:https://mainnet.base.org}
  basescan:
    api-key: ${BASESCAN_API_KEY:}
    base-url: https://api.basescan.org/api
