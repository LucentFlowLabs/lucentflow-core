services:
  postgres:
    image: postgres:16-alpine
    container_name: lucentflow-postgres
    restart: always
    environment:
      POSTGRES_DB: lucentflow
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: lucentflow_pwd
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - lucentflow-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d lucentflow"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: lucentflow-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@lucentflow.com
      PGADMIN_DEFAULT_PASSWORD: lucentflow_admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - lucentflow-network
    depends_on:
      postgres:
        condition: service_healthy

  metabase:
    image: metabase/metabase:latest
    container_name: lucentflow-metabase
    restart: always
    environment:
      MB_ENABLE_METRICS: true
      MB_SITE_URL: http://localhost:3000
      MB_SITE_NAME: LucentFlow Dashboard
    ports:
      - "3000:3000"
    networks:
      - lucentflow-network
    volumes:
      - metabase_data:/var/lib/metabase
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local
  metabase_data:
    driver: local

networks:
  lucentflow-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
