version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: lucentflow-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lucentflow}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lucentflow_pwd}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - lucentflow-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-lucentflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: lucentflow-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@lucentflow.com
      PGADMIN_DEFAULT_PASSWORD: ${POSTGRES_PASSWORD:-lucentflow_pwd}_admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - lucentflow-network
    depends_on:
      postgres:
        condition: service_healthy

  metabase:
    image: metabase/metabase:latest
    container_name: lucentflow-metabase
    restart: always
    environment:
      MB_SITE_NAME: "LucentFlow | Base Asset Intelligence"
      MB_SITE_URL: "http://localhost:3000"
      MB_ENABLE_METRICS: "true"
      MB_JETTY_PORT: "3000"
      MB_DB_TYPE: h2
      MB_DB_FILE: /metabase-data/metabase.db
      JAVA_OPTS: "-Xmx512m -Xms512m"
    ports:
      - "3000:3000"
    networks:
      - lucentflow-network
    volumes:
      - ./metabase-data:/metabase-data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  lucentflow-api:
    build:
      context: ../../
      dockerfile: Dockerfile
    container_name: lucentflow-api
    restart: always
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-lucentflow}?reWriteBatchedInserts=true
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-admin}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-lucentflow_pwd}
      SPRING_FLYWAY_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-lucentflow}
      SPRING_FLYWAY_USER: ${POSTGRES_USER:-admin}
      SPRING_FLYWAY_PASSWORD: ${POSTGRES_PASSWORD:-lucentflow_pwd}
      SPRING_FLYWAY_USERNAME: ${POSTGRES_USER:-admin}
      JAVA_OPTS: ${JAVA_OPTS:--XX:+UseZGC -XX:+ZGenerational -Xms512m -Xmx2g}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      PROXY_HOST: ${PROXY_HOST:-127.0.0.1}
      PROXY_PORT: ${PROXY_PORT:-10808}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      BASESCAN_API_KEY: ${BASESCAN_API_KEY:-}
      BASESCAN_BASE_URL: https://api.basescan.org/api
      LUCENTFLOW_CHAIN_RPC_URL: ${LUCENTFLOW_CHAIN_RPC_URL:-https://mainnet.base.org}
    ports:
      - "8080:8080"
    networks:
      - lucentflow-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  lucentflow-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
